<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Lightning Bolt / Glow Gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <!-- Brain Glow Gradient -->
    <linearGradient id="brainGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
  </defs>

  <!-- Base Card -->
  <rect width="32" height="32" rx="8" fill="url(#bgGrad)" />
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="none" stroke="#334155" stroke-opacity="0.6" />

  <!-- Brain Pattern / AI Nodes (Stylized) -->
  <path d="M9 16 C9 11, 12 8, 16 8 C20 8, 23 11, 23 16 C23 20, 20 23, 16 23 C12 23, 9 20, 9 16 Z" fill="none" stroke="url(#brainGrad)" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.4" />
  
  <!-- Glowing Brain Left & Right Hemisphere Silhouette -->
  <path d="M12 16 C12 13, 13.5 11.5, 15.5 11.5 M20 16 C20 13, 18.5 11.5, 16.5 11.5" fill="none" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round" />
  <path d="M12 16 C12 18, 13.5 19.5, 15.5 19.5 M20 16 C20 18, 18.5 19.5, 16.5 19.5" fill="none" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round" />

  <!-- Center Lightning Bolt (Energy/Mind/AI) -->
  <path d="M17.5 7 L12 16 H16 L14.5 25 L20 14 H16 L17.5 7 Z" fill="url(#boltGrad)" />
</svg>
